<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼多多商品采集助手</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }
    .header {
      text-align: center;
      margin-bottom: 15px;
    }
    .header h1 {
      font-size: 18px;
      color: #ff4400;
      margin: 0;
    }
    .header p {
      font-size: 12px;
      color: #666;
      margin: 5px 0 0 0;
    }
    .status {
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    .status.success {
      border-left: 3px solid #4caf50;
      color: #4caf50;
    }
    .status.info {
      border-left: 3px solid #2196f3;
      color: #2196f3;
    }
    .instructions {
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      color: #666;
    }
    .instructions h3 {
      font-size: 14px;
      color: #333;
      margin: 0 0 8px 0;
    }
    .instructions ul {
      margin: 0;
      padding-left: 15px;
    }
    .instructions li {
      margin-bottom: 5px;
      line-height: 1.5;
    }
    .footer {
      text-align: center;
      font-size: 11px;
      color: #999;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>拼多多商品采集助手</h1>
    <p>版本 1.0.0</p>
  </div>
  
  <div id="status" class="status info">
    请在拼多多商品页面使用，右上角会出现采集按钮
  </div>
  
  <div class="instructions">
    <h3>使用说明</h3>
    <ul>
      <li>打开拼多多商品详情页</li>
      <li>点击右上角的橙色采集按钮</li>
      <li>商品信息会保存为CSV文件</li>
      <li>商品主图会自动下载</li>
    </ul>
  </div>
  
  <div class="footer">
    适用于Chromium内核浏览器
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
